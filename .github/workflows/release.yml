name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x86_64
          - platform: 'windows-latest'
            target: aarch64-pc-windows-msvc
            artifact_name: windows-aarch64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.target }}

      - name: Install NSIS
        if: startsWith(matrix.platform, 'windows')
        run: |
          choco install nsis --no-progress -y

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }} --bundles nsis
          projectPath: src-tauri
          tauriScript: npx tauri

      - name: Debug build output
        run: |
          echo "=== Build output ==="
          ls -R src-tauri/target/${{ matrix.target }}/release/bundle/ 2>/dev/null || true
          find src-tauri/target -name "*.exe" -type f 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.artifact_name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          overwrite: true
          if-no-files-found: warn
          retention-days: 1

      - name: Create Release (x86_64 only)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          draft: false
          fail_on_unmatched_files: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
