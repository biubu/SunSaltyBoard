name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
            bundle_glob: src-tauri/target/release/bundle/nsis/SunSaltyBoard_*.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: deb
            bundle_glob: src-tauri/target/release/bundle/deb/*.deb

    runs-on: ${{ matrix.os }}
    env:
      APPIMAGE_EXTRACT_AND_RUN: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev

      - name: Install frontend dependencies
        shell: bash
        run: npm ci --no-audit --no-fund

      - name: Build Tauri app
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes 2>/dev/null || echo "Release already exists, skipping creation"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload bundle artifacts
        shell: bash
        run: |
          for pattern in ${{ matrix.bundle_glob }}; do
            for file in $pattern; do
              if [ -f "$file" ]; then
                gh release upload "${{ github.ref_name }}" "$file" --clobber
              fi
            done
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}