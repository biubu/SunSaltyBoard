name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload NSIS installer
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILENAME="src-tauri/target/release/bundle/nsis/SunSaltyBoard_${TAG_VERSION}_x64-setup.exe"
          cp "src-tauri/target/release/bundle/nsis/SunSaltyBoard_"*".exe" "$FILENAME"
          gh release upload "${{ github.ref_name }}" "$FILENAME" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}